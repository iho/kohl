name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (litep2p build dependency)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          components: rust-src, rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Unit tests (workspace, no RandomX)
        run: |
          cargo test -p ringct-primitives -p ringct-crypto -p pallet-ringct -p pallet-difficulty
          cargo test -p kohl-pow --features node
          cargo test -p kohl-wallet

      - name: Build node + runtime
        run: cargo build -p kohl-node -p kohl-runtime

      - name: Learn-script smoke
        run: python3 examples/learn_ringct.py --check

      - name: Pallet benchmarks compile
        run: cargo test -p pallet-ringct --features runtime-benchmarks --lib --no-run
