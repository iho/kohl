<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Not found — Kohl</title>
  <meta name="theme-color" content="#f7f3ec" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <script>
    /* Theme control — inline so CDN-stale /theme.js cannot break the toggle. */
    window.kohlTheme = (function () {
      var KEY = "kohl-theme";
      function systemTheme() {
        try {
          return matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        } catch (e) { return "light"; }
      }
      function readStored() {
        try {
          var s = localStorage.getItem(KEY);
          if (s === "light" || s === "dark") return s;
        } catch (e) {}
        return null;
      }
      function get() {
        var a = document.documentElement.getAttribute("data-theme");
        if (a === "light" || a === "dark") return a;
        if (document.documentElement.classList.contains("theme-dark")) return "dark";
        if (document.documentElement.classList.contains("theme-light")) return "light";
        return readStored() || systemTheme();
      }
      function set(theme) {
        if (theme !== "dark") theme = "light";
        var root = document.documentElement;
        root.setAttribute("data-theme", theme);
        root.classList.remove("theme-light", "theme-dark");
        root.classList.add("theme-" + theme);
        try { localStorage.setItem(KEY, theme); } catch (e) {}
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", theme === "dark" ? "#070707" : "#f7f3ec");
        var btn = document.getElementById("theme-toggle");
        if (btn) {
          btn.setAttribute("aria-label", theme === "dark" ? "Switch to light theme" : "Switch to dark theme");
          btn.setAttribute("title", theme === "dark" ? "Light theme" : "Dark theme");
          btn.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
        }
      }
      function toggle() {
        set(get() === "dark" ? "light" : "dark");
        return false;
      }
      set(readStored() || systemTheme());
      return { get: get, set: set, toggle: toggle };
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=3" />
  <style>
    .notfound {
      min-height: calc(100vh - 8rem);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 4rem 1.25rem;
    }
    .notfound h1 {
      margin: 0;
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(2.5rem, 6vw, 4rem);
    }
    .notfound p {
      color: var(--muted);
      margin: 0.75rem 0 1.5rem;
    }
  </style>
</head>
<body>
  <div class="noise" aria-hidden="true"></div>
  <main class="notfound">
    <div>
      <p class="eyebrow">404</p>
      <h1>Nothing here.</h1>
      <p>That path isn’t on kohl.network.</p>
      <a class="btn btn-primary" href="/">Back home</a>
    </div>
  </main>
</body>
</html>
